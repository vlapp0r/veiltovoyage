baseURL = "https://vlapp0r.github.io/veiltovoyage/"
languageCode = "en-us"
title = "Veil to Voyage"
theme = "PaperMod"
paginate = 10
enableRobotsTXT = true
buildDrafts = false
buildFuture = false

[params]
  env = "production"
  title = "Veil to Voyage"
  description = "Wedding planning guides, honeymoon destinations, and honest budget advice for newly engaged couples."
  author = "Veil to Voyage"
  defaultTheme = "light"
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = false
  ShowRssButtonInSectionTermList = true
  dateFormat = "January 2, 2006"
  mainSections = ["posts"]
  ShowAllPagesInArchive = true

  [params.homeInfoParams]
    Title = "From \"I do\" to the honeymoon"
    Content = "Real planning guides, honeymoon inspiration, and honest budget advice for newly engaged couples."

  [[params.socialIcons]]
    name = "pinterest"
    url = "https://pinterest.com/veiltovoyage"

[menu]
  [[menu.main]]
    identifier = "wedding"
    name = "Wedding"
    url = "/categories/wedding-planning/"
    weight = 1
  [[menu.main]]
    identifier = "honeymoon"
    name = "Honeymoon"
    url = "/categories/honeymoon-travel/"
    weight = 2
  [[menu.main]]
    identifier = "registry"
    name = "Registry"
    url = "/categories/registry/"
    weight = 3
  [[menu.main]]
    identifier = "budget"
    name = "Budget"
    url = "/categories/budget/"
    weight = 4
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 5

[taxonomies]
  category = "categories"
  tag = "tags"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false
