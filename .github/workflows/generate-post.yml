name: Generate weekly post

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Generate post
        run: node scripts/generate-post.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Create pull request with new post
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Add draft post and update topic queue"
          branch: post/auto-${{ github.run_number }}
          delete-branch: true
          title: "New draft post — review and merge to publish"
          body: |
            Claude has written a new post draft.

            **Before merging:**
            - Read through the post
            - Replace any [AFFILIATE LINK] placeholders with real links
            - Add images if you have them
            - Confirm `draft: false` in the front matter

            Merging this PR will publish the post automatically.
          base: main
          labels: content-draft
          add-paths: |
            content/posts/*.md
            scripts/used-topics.json
